<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>MON MONDE — Notes & Saved</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#f5f5f0;--surface:#fff;--surface2:#f0efea;--surface3:#e8e7e1;
  --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);
  --accent:#3a9463;--accent-light:#5CDB95;--accent-glow:rgba(92,219,149,0.12);
  --red:#e05252;--red-glow:rgba(224,82,82,0.1);
  --amber:#e0a352;--amber-glow:rgba(224,163,82,0.1);
  --purple:#8b5cf6;--purple-glow:rgba(139,92,246,0.1);
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,0.1);
  --text:#1a1a1a;--text-mid:#555;--text-dim:#999;
  --shadow:0 2px 12px rgba(0,0,0,0.06);--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;}
.app{max-width:430px;margin:0 auto;padding-bottom:60px;}

/* HEADER */
.header{padding:52px 20px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.back-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-mid);text-decoration:none;flex-shrink:0;}
.header-text{flex:1;}
.header-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:2px;}
.header-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text);}

/* PIN */
.pin-gate-wrap{padding:40px 20px;text-align:center;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pin-gate-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px;}
.pin-gate-sub{font-size:13px;color:var(--text-dim);margin-bottom:28px;line-height:1.5;}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--surface3);border:2px solid var(--border-strong);transition:background 0.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;}
.pin-key:active{background:var(--accent-glow);border-color:var(--accent);}
.pin-key.del{font-size:14px;color:var(--text-dim);}
.pin-error{font-size:12px;color:var(--red);margin-top:14px;height:16px;}

/* MAIN */
.main{display:none;}
.main.visible{display:block;}

/* QUICK ADD */
.quick-add{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.qa-cat-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.qa-cat-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s;background:var(--surface2);color:var(--text-dim);border-color:var(--border);}
.qa-cat-btn.active-link{background:var(--blue-glow);color:var(--blue);border-color:rgba(59,130,246,0.3);}
.qa-cat-btn.active-location{background:var(--accent-glow);color:var(--accent);border-color:rgba(58,148,99,0.3);}
.qa-cat-btn.active-idea{background:var(--purple-glow);color:var(--purple);border-color:rgba(139,92,246,0.3);}
.qa-cat-btn.active-note{background:var(--amber-glow);color:var(--amber);border-color:rgba(224,163,82,0.3);}
.qa-fields{display:flex;flex-direction:column;gap:8px;}
.qa-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.qa-input:focus{border-color:var(--accent);}
.qa-input::placeholder{color:var(--text-dim);}
.qa-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-mid);outline:none;}
.qa-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;resize:none;line-height:1.5;min-height:80px;}
.qa-textarea:focus{border-color:var(--accent);}
.qa-add-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity 0.2s;}
.qa-add-btn:hover{opacity:0.88;}

/* TABS */
.tabs-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:11px 14px;font-size:11px;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px;white-space:nowrap;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;padding:14px 16px;}
.tab-panel.active{display:block;}

/* SHARED ITEM */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.item-header{display:flex;align-items:flex-start;gap:10px;}
.item-info{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:3px;word-break:break-word;}
.item-title.done{opacity:0.4;text-decoration:line-through;}
.item-meta{font-size:11px;color:var(--text-dim);line-height:1.4;}
.item-actions{display:flex;gap:6px;flex-shrink:0;}
.action-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}
.action-check{background:var(--accent-glow);color:var(--accent);}
.action-check.done{background:var(--accent);color:#fff;}
.action-edit{background:var(--surface2);color:var(--text-mid);}
.action-del{background:var(--red-glow);color:var(--red);}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-mid);transition:all 0.2s;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}
.empty-state .emoji{font-size:32px;margin-bottom:12px;}
.empty-state p{font-size:13px;font-style:italic;line-height:1.6;}

/* LINKS */
.link-url{font-size:11px;color:var(--blue);margin-top:3px;word-break:break-all;text-decoration:none;display:block;}
.type-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;display:inline-block;}
.type-article{background:var(--blue-glow);color:var(--blue);}
.type-purchase{background:var(--amber-glow);color:var(--amber);}
.type-recipe{background:var(--accent-glow);color:var(--accent);}
.type-other{background:var(--surface2);color:var(--text-mid);}

/* LOCATIONS — LEAFLET */
#map{height:280px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px;z-index:1;}
.view-toggle{display:flex;gap:6px;margin-bottom:12px;}
.view-btn{flex:1;padding:8px;font-size:11px;font-weight:600;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-mid);cursor:pointer;transition:all 0.2s;}
.view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.loc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:border-color 0.2s;}
.loc-card:active{border-color:var(--accent);}
.loc-card.highlighted{border-color:var(--accent);background:var(--accent-glow);}

/* IDEAS */
.idea-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.idea-card.archived{border-left-color:var(--text-dim);opacity:0.6;}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.status-active{background:var(--purple-glow);color:var(--purple);}
.status-archived{background:var(--surface2);color:var(--text-dim);}

/* NOTES */
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.note-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.note-date{font-size:10px;color:var(--text-dim);margin-top:8px;}

/* REFLECT */
.reflect-section{margin-bottom:20px;}
.reflect-label{font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--border);}
.checkin-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.checkin-done-note{font-size:12px;color:var(--text-dim);font-style:italic;text-align:center;padding:10px 0;}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.review-week{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:8px;}
.review-text{font-size:13px;color:var(--text-mid);line-height:1.75;white-space:pre-wrap;}
.review-gen-btn{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all 0.2s;}
.review-gen-btn:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent);}
.checkin-log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.checkin-log-item:last-child{border-bottom:none;}
.checkin-log-date{font-size:10px;font-weight:600;color:var(--text-dim);min-width:52px;padding-top:2px;}
.checkin-log-answers{font-size:12px;color:var(--text-mid);line-height:1.6;}
.shimmer{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--surface2) 25%,#e8e8e4 50%,var(--surface2) 75%);background-size:200% 100%;animation:shim 1.4s infinite;margin-bottom:8px;}
.shimmer:nth-child(2){width:72%;animation-delay:0.1s;}
.shimmer:nth-child(3){width:52%;animation-delay:0.2s;}
@keyframes shim{0%{background-position:200% center;}100%{background-position:-200% center;}}

/* CHECK-IN MODAL */
.checkin-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.checkin-overlay.visible{opacity:1;pointer-events:all;}
.checkin-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.checkin-overlay.visible .checkin-sheet{transform:translateY(0);}
.checkin-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 20px;}
.checkin-q-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.checkin-q-num{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--accent-glow);color:var(--accent);}
.checkin-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.checkin-opt{padding:9px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-mid);transition:all 0.2s;}
.checkin-opt.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.checkin-progress{display:flex;gap:6px;margin-bottom:24px;}
.checkin-prog-dot{flex:1;height:3px;border-radius:2px;background:var(--surface3);transition:background 0.3s;}
.checkin-prog-dot.active{background:var(--accent);}
.checkin-nav{display:flex;gap:10px;}
.checkin-nav-btn{flex:1;padding:12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-mid);}
.checkin-nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);max-height:88vh;overflow-y:auto;}
.modal-overlay.visible .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;display:block;}
.modal-input,.modal-textarea,.modal-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;}
.modal-input:focus,.modal-textarea:focus,.modal-select:focus{border-color:var(--accent);}
.modal-textarea{min-height:100px;resize:vertical;line-height:1.6;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-cancel{flex:1;padding:12px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--text-mid);}
.modal-save{flex:2;padding:12px;font-size:13px;font-weight:600;background:var(--accent);border:none;border-radius:10px;cursor:pointer;color:#fff;}
.modal-delete{flex:1;padding:12px;font-size:13px;font-weight:600;background:var(--red-glow);border:none;border-radius:10px;cursor:pointer;color:var(--red);}

.footer{padding:28px 20px 10px;display:flex;align-items:center;justify-content:center;gap:10px;}
.footer-line{width:20px;height:1px;background:var(--accent);opacity:0.2;}
.footer-text{font-size:10px;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <a class="back-btn" href="index.html">←</a>
  <div class="header-text">
    <div class="header-eyebrow">Mon Monde</div>
    <div class="header-title">Notes & Saved</div>
  </div>
</div>



<!-- MAIN -->
<div class="main" id="main-content">

  <!-- QUICK ADD -->
  <div class="quick-add">
    <div class="qa-cat-row">
      <button class="qa-cat-btn" id="qcat-link" onclick="selectQACat('link')">🔗 Link</button>
      <button class="qa-cat-btn" id="qcat-location" onclick="selectQACat('location')">📍 Location</button>
      <button class="qa-cat-btn" id="qcat-idea" onclick="selectQACat('idea')">💡 Idea</button>
      <button class="qa-cat-btn" id="qcat-note" onclick="selectQACat('note')">📝 Note</button>
    </div>
    <div class="qa-fields" id="qa-fields"></div>
  </div>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" id="tab-links" onclick="switchTab('links')">🔗 Links</button>
    <button class="tab-btn" id="tab-locations" onclick="switchTab('locations')">📍 Locations</button>
    <button class="tab-btn" id="tab-ideas" onclick="switchTab('ideas')">💡 Ideas</button>
    <button class="tab-btn" id="tab-notes" onclick="switchTab('notes')">📝 Notes</button>
    <button class="tab-btn" id="tab-reflect" onclick="switchTab('reflect')">🪞 Reflect</button>
  </div>

  <!-- LINKS -->
  <div class="tab-panel active" id="panel-links">
    <div class="filter-row">
      <span class="filter-chip active" id="lf-all" onclick="filterLinks('all')">All</span>
      <span class="filter-chip" id="lf-unread" onclick="filterLinks('unread')">Unread</span>
      <span class="filter-chip" id="lf-article" onclick="filterLinks('article')">Articles</span>
      <span class="filter-chip" id="lf-purchase" onclick="filterLinks('purchase')">Purchases</span>
      <span class="filter-chip" id="lf-recipe" onclick="filterLinks('recipe')">Recipes</span>
    </div>
    <div id="links-list"></div>
  </div>

  <!-- LOCATIONS -->
  <div class="tab-panel" id="panel-locations">
    <div class="filter-row">
      <span class="filter-chip active" id="locf-all" onclick="filterLocations('all')">All</span>
      <span class="filter-chip" id="locf-restaurant" onclick="filterLocations('restaurant')">Restaurants</span>
      <span class="filter-chip" id="locf-bar" onclick="filterLocations('bar')">Bars</span>
      <span class="filter-chip" id="locf-cafe" onclick="filterLocations('cafe')">Cafés</span>
      <span class="filter-chip" id="locf-shop" onclick="filterLocations('shop')">Shops</span>
      <span class="filter-chip" id="locf-other" onclick="filterLocations('other')">Other</span>
    </div>
    <div id="quartier-filters" style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px"></div>
    <div id="locations-list"></div>
  </div>

  <!-- IDEAS -->
  <div class="tab-panel" id="panel-ideas">
    <div class="filter-row">
      <span class="filter-chip active" id="idf-all" onclick="filterIdeas('all')">All</span>
      <span class="filter-chip" id="idf-active" onclick="filterIdeas('active')">Active</span>
      <span class="filter-chip" id="idf-archived" onclick="filterIdeas('archived')">Archived</span>
    </div>
    <div id="ideas-list"></div>
  </div>

  <!-- NOTES -->
  <div class="tab-panel" id="panel-notes">
    <div class="filter-row">
      <span class="filter-chip active" id="nf-all" onclick="filterNotes('all')">All</span>
      <span class="filter-chip" id="nf-personal" onclick="filterNotes('personal')">Personal</span>
      <span class="filter-chip" id="nf-work" onclick="filterNotes('work')">Work</span>
      <span class="filter-chip" id="nf-project" onclick="filterNotes('project')">Project</span>
      <span class="filter-chip" id="nf-other" onclick="filterNotes('other')">Other</span>
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- REFLECT -->
  <div class="tab-panel" id="panel-reflect">

    <!-- Daily check-in -->
    <div class="reflect-section">
      <div class="reflect-label">Daily Check-in</div>
      <div id="checkin-status"></div>
    </div>

    <!-- Weekly review -->
    <div class="reflect-section">
      <div class="reflect-label">Weekly Review</div>
      <div id="weekly-review-section"></div>
    </div>

    <!-- Check-in history -->
    <div class="reflect-section">
      <div class="reflect-label">Recent Check-ins</div>
      <div id="checkin-history"></div>
    </div>

  </div>

</div>

<div class="footer">
  <div class="footer-line"></div>
  <div class="footer-text">Mon Monde</div>
  <div class="footer-line"></div>
</div>

<!-- CHECK-IN SHEET -->
<div class="checkin-overlay" id="checkin-overlay">
  <div class="checkin-sheet">
    <div class="checkin-handle"></div>
    <div class="checkin-progress" id="checkin-progress">
      <div class="checkin-prog-dot active" id="cpd0"></div>
      <div class="checkin-prog-dot" id="cpd1"></div>
      <div class="checkin-prog-dot" id="cpd2"></div>
    </div>
    <div class="checkin-q-label">
      <span class="checkin-q-num" id="checkin-q-num">1 / 3</span>
      <span id="checkin-q-text"></span>
    </div>
    <div class="checkin-options" id="checkin-options"></div>
    <div class="checkin-nav">
      <button class="checkin-nav-btn" id="checkin-back-btn" onclick="checkinBack()" style="display:none">Back</button>

<script>
const TODAY_STR = new Date().toISOString().split('T')[0];
const KEYS = { links:'mm_notes_links', locations:'mm_notes_lieux', ideas:'mm_notes_idees', notes:'mm_notes_notes', checkins:'mm_checkins', reviews:'mm_weekly_reviews' };
function load(k){ return JSON.parse(localStorage.getItem(KEYS[k])||'[]'); }
function save(k,d){ localStorage.setItem(KEYS[k],JSON.stringify(d)); }

// ── PIN ──────────────────────────────────────────────
let pinBuf='';
function hashPin(p){ let h=0; for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;} return h.toString(36); }
function pinPress(d){ if(pinBuf.length>=4)return; pinBuf+=d; updateDots(); if(pinBuf.length===4)setTimeout(checkPin,200); }
function pinDel(){ pinBuf=pinBuf.slice(0,-1); updateDots(); }
function updateDots(){ for(let i=0;i<4;i++) document.getElementById(`pd${i}`).classList.toggle('filled',i<pinBuf.length); }
function checkPin(){
  const stored=localStorage.getItem('mm_vault_pin');
  if(!stored||hashPin(pinBuf)===stored){ pinBuf=''; openMain(); }
  else{
    const el=document.getElementById('pin-error'); el.textContent='Incorrect PIN. Try again.';
    setTimeout(()=>el.textContent='',2500); pinBuf=''; updateDots();
  }
}
function openMain(){
  document.getElementById('main-content').classList.add('visible');
  renderAll();
  checkEveningCheckin();
}

// ── MODAL ────────────────────────────────────────────
function openModal(title,body,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-actions').innerHTML=actions;
  document.getElementById('modal-overlay').classList.add('visible');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('visible'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay'))closeModal(); }

// ── TABS ─────────────────────────────────────────────
let currentTab='links';
function switchTab(tab){
  currentTab=tab;
  ['links','locations','ideas','notes','reflect'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`panel-${t}`).classList.toggle('active',t===tab);
  });
if(tab==='locations'){ renderLocations(); }
  if(tab==='reflect'){ renderReflect(); }
}

// ── QUICK ADD ────────────────────────────────────────
let qaCat='link';
function selectQACat(cat){

    btn.className='qa-cat-btn';

}

function renderQAFields(){

    el.innerHTML=`
      <input class="qa-input" id="qa-url" placeholder="Paste URL..." type="url"/>
      <input class="qa-input" id="qa-link-title" placeholder="Title (optional — auto-filled if blank)"/>
      <select class="qa-select" id="qa-link-type">
        <option value="article">📰 Article</option>
        <option value="purchase">🛍 Purchase to consider</option>
        <option value="recipe">🍽 Recipe</option>
        <option value="other">🔗 Other</option>
      </select>

    el.innerHTML=`
      <input class="qa-input" id="qa-loc-name" placeholder="Name of the place..."/>
      <input class="qa-input" id="qa-loc-address" placeholder="Address or neighbourhood (Paris if blank)"/>
      <select class="qa-select" id="qa-loc-type">

        <option value="bar">🍸 Bar</option>

        <option value="shop">🛍 Shop</option>

// ── LINKS ────────────────────────────────────────────
let linkFilter='all';
function filterLinks(f){
  linkFilter=f;
  ['all','unread','article','purchase','recipe'].forEach(x=>document.getElementById(`lf-${x}`)?.classList.toggle('active',x===f));
  renderLinks();
}
function addLink(){
  const url=document.getElementById('qa-url')?.value.trim();
  const title=document.getElementById('qa-link-title')?.value.trim()||url||'Untitled';
  const type=document.getElementById('qa-link-type')?.value||'article';

  save('links',links); renderLinks(); switchTab('links'); renderQAFields();
}
function renderLinks(){
  const links=load('links');
  let filtered=links;
  if(linkFilter==='unread') filtered=links.filter(l=>!l.read);
  else if(linkFilter!=='all') filtered=links.filter(l=>l.type===linkFilter);
  const el=document.getElementById('links-list');
  if(!filtered.length){el.innerHTML=`<div class="empty-state"><div class="emoji">🔗</div><p>No links saved yet.<br/>Paste a URL in Quick Add!</p></div>`;return;}
  el.innerHTML=filtered.map(l=>`
    <div class="item-card">
      <div class="item-header">
        <div class="item-info">
          <div class="item-title ${l.read?'done':''}">${l.title}</div>

          <div style="margin-top:4px">
            <span class="type-badge type-${l.type}">${l.type}</span>

        </div>

          <button class="action-btn action-check ${l.read?'done':''}" onclick="toggleLink(${l.id})">✓</button>
          <button class="action-btn action-edit" onclick="editLink(${l.id})">✎</button>
          <button class="action-btn action-del" onclick="delLink(${l.id})">✕</button>

      </div>

}
function toggleLink(id){const links=load('links');const l=links.find(x=>x.id===id);if(l)l.read=!l.read;save('links',links);renderLinks();}
function delLink(id){save('links',load('links').filter(l=>l.id!==id));renderLinks();}
function editLink(id){
  const links=load('links');const l=links.find(x=>x.id===id);if(!l)return;
  openModal('Edit link',
    `<div class="modal-field"><label class="modal-label">Title</label><input class="modal-input" id="m-title" value="${l.title}"/></div>
    <div class="modal-field"><label class="modal-label">URL</label><input class="modal-input" id="m-url" value="${l.url||''}"/></div>
    <div class="modal-field"><label class="modal-label">Type</label>
    <select class="modal-select" id="m-type">${['article','purchase','recipe','other'].map(t=>`<option value="${t}" ${t===l.type?'selected':''}>${t}</option>`).join('')}</select></div>`,
    `<button class="modal-cancel" onclick="closeModal()">Cancel</button>
     <button class="modal-delete" onclick="delLink(${id});closeModal()">Delete</button>
     <button class="modal-save" onclick="saveLink(${id})">Save</button>`);
}
function saveLink(id){
  const links=load('links');const l=links.find(x=>x.id===id);if(!l)return;
  l.title=document.getElementById('m-title').value.trim()||l.title;
  l.url=document.getElementById('m-url').value.trim();
  l.type=document.getElementById('m-type').value;
  save('links',links);renderLinks();closeModal();
}

// ── LOCATIONS + LEAFLET ──────────────────────────────
let map=null, markers=[], locFilter='all', locView='map', locQuartier='all';

function initMap(){
  if(map) return;
  const mapEl=document.getElementById('map');
  if(!mapEl||mapEl.style.display==='none') return;
  map=L.map('map').setView([48.8566,2.3522],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
  renderLocationMarkers();
}

function renderLocationMarkers(){
  if(!map) return;
  markers.forEach(m=>m.remove());
  markers=[];
  const locs=getFilteredLocations();
  const typeEmoji={restaurant:'🍽',bar:'🍸',cafe:'☕',shop:'🛍',other:'📍'};
  locs.forEach(loc=>{
    if(loc.lat&&loc.lng){
      const marker=L.marker([loc.lat,loc.lng]).addTo(map);
      marker.bindPopup(`<strong>${loc.name}</strong><br/>${typeEmoji[loc.type]||'📍'} ${loc.type}<br/><small>${loc.status}</small>`);
      marker.locId=loc.id;
      markers.push(marker);
    }
  });
  if(markers.length>0){
    const group=L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

function centerMapOn(id){
  const locs=load('locations');
  const loc=locs.find(l=>l.id===id);
  if(!loc||!loc.lat||!loc.lng||!map) return;
  map.setView([loc.lat,loc.lng],16);
  const marker=markers.find(m=>m.locId===id);
  if(marker) marker.openPopup();
  switchLocView('map');
  document.querySelectorAll('.loc-card').forEach(c=>c.classList.remove('highlighted'));
  const card=document.querySelector(`[data-loc-id="${id}"]`);
  if(card){card.classList.add('highlighted');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

async function geocode(name, address) {
  const query = encodeURIComponent(address && address.length > 2 ? `${name} ${address}` : `${name} Paris`);
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`, {
      headers: { 'Accept': 'application/json', 'Accept-Language': 'fr' }
    });
    const d = await r.json();
    if (d && d[0]) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
  } catch(e) {}
  return null;
}

function filterLocations(f){
  locFilter=f;
  ['all','restaurant','bar','cafe','shop','other'].forEach(x=>document.getElementById(`locf-${x}`)?.classList.toggle('active',x===f));
  renderLocations();
  renderLocationMarkers();
}

function switchLocView(v){ renderLocations(); }
function filterQuartier(q){
  locQuartier=q;
  renderLocations();
}
function getFilteredLocations(){
  const locs=load('locations');
  return locFilter==='all'?locs:locs.filter(l=>l.type===locFilter);
}

function renderLocations(){
  const locs = load('locations');
  const filtered = locFilter==='all' ? locs : locs.filter(l=>l.type===locFilter);
  const el = document.getElementById('locations-list');
  const typeEmoji = {restaurant:'🍽',bar:'🍸',cafe:'☕',shop:'🛍',other:'📍'};

  // Build quartier filter chips dynamically
  const quartiers = [...new Set(locs.map(l => l.address).filter(Boolean))];
  const qEl = document.getElementById('quartier-filters');
  if (qEl) {
    qEl.innerHTML = `<span class="filter-chip ${locQuartier==='all'?'active':''}" onclick="filterQuartier('all')">Tous</span>`
      + quartiers.map(q => `<span class="filter-chip ${locQuartier===q?'active':''}" onclick="filterQuartier('${q}')">${q}</span>`).join('');
  }

  // Apply quartier filter
  const finalFiltered = locQuartier==='all' ? filtered : filtered.filter(l=>l.address===locQuartier);

  if(!finalFiltered.length){
    el.innerHTML=`<div class="empty-state"><div class="emoji">📍</div><p>No locations saved yet.<br/>Add a restaurant, bar, café...</p></div>`;
    return;
  }

  el.innerHTML = finalFiltered.map(l=>`
    <div class="loc-card">
      <div class="item-header">
        <div class="item-info">
          <div class="item-title">${typeEmoji[l.type]||'📍'} ${l.name}</div>
          <div class="item-meta">${l.address||'—'}${l.note?' · '+l.note:''}</div>
          <div style="margin-top:4px">
            <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:${l.status==='visited'?'var(--accent-glow)':'var(--amber-glow)'};color:${l.status==='visited'?'var(--accent)':'var(--amber)'}">${l.status}</span>
          </div>
        </div>
        <div class="item-actions">
          <button class="action-btn action-check ${l.status==='visited'?'done':''}" onclick="toggleLocation(${l.id})">✓</button>
          <button class="action-btn action-edit" onclick="editLocation(${l.id})">✎</button>
          <button class="action-btn action-del" onclick="delLocation(${l.id})">✕</button>
        </div>
      </div>
    </div>`).join('');
}

async function addLocation(){
  const name=document.getElementById('qa-loc-name')?.value.trim();
  if(!name){alert('Enter a location name.');return;}
  const address=document.getElementById('qa-loc-address')?.value.trim()||'';
  const type=document.getElementById('qa-loc-type')?.value||'restaurant';
  const note=document.getElementById('qa-loc-note')?.value.trim()||'';
  const locs=load('locations');
  const coords = await geocode(name, address); locs.unshift({id:Date.now(),name,address,type,note,status:'to visit',lat:coords?.lat||null,lng:coords?.lng||null,date:TODAY_STR});
  locs.unshift({id:Date.now(),name,address,type,note,status:'to visit',lat:coords?.lat||null,lng:coords?.lng||null,date:TODAY_STR});
  save('locations',locs);
  renderLocations();
  renderLocationMarkers();
  switchTab('locations');
  renderQAFields();
}

function toggleLocation(id){
  const locs=load('locations');const l=locs.find(x=>x.id===id);
  if(l) l.status=l.status==='visited'?'to visit':'visited';
  save('locations',locs);renderLocations();renderLocationMarkers();
}
function delLocation(id){save('locations',load('locations').filter(l=>l.id!==id));renderLocations();renderLocationMarkers();}
function editLocation(id){
  const locs=load('locations');const l=locs.find(x=>x.id===id);if(!l)return;
  openModal('Edit location',
    `<div class="modal-field"><label class="modal-label">Name</label><input class="modal-input" id="m-name" value="${l.name}"/></div>
    <div class="modal-field"><label class="modal-label">Address</label><input class="modal-input" id="m-address" value="${l.address||''}"/></div>
    <div class="modal-field"><label class="modal-label">Note</label><input class="modal-input" id="m-note" value="${l.note||''}"/></div>
    <div class="modal-field"><label class="modal-label">Type</label>
    <select class="modal-select" id="m-type">${['restaurant','bar','cafe','shop','other'].map(t=>`<option value="${t}" ${t===l.type?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="modal-field"><label class="modal-label">Status</label>
    <select class="modal-select" id="m-status">
      <option value="to visit" ${l.status==='to visit'?'selected':''}>To visit</option>
      <option value="visited" ${l.status==='visited'?'selected':''}>Visited</option>
      <option value="recommended" ${l.status==='recommended'?'selected':''}>Recommended</option>
    </select></div>`,
    `<button class="modal-cancel" onclick="closeModal()">Cancel</button>
     <button class="modal-delete" onclick="delLocation(${id});closeModal()">Delete</button>
     <button class="modal-save" onclick="saveLocation(${id})">Save</button>`);
}
async function saveLocation(id){
  const locs=load('locations');const l=locs.find(x=>x.id===id);if(!l)return;
  const newName=document.getElementById('m-name').value.trim()||l.name;
  const newAddr=document.getElementById('m-address').value.trim();
  if(newName!==l.name||newAddr!==l.address){
    const coords=await geocode(newName,newAddr);
    if(coords){l.lat=coords.lat;l.lng=coords.lng;}
  }
  l.name=newName;l.address=newAddr;
  l.note=document.getElementById('m-note').value.trim();
  l.type=document.getElementById('m-type').value;
  l.status=document.getElementById('m-status').value;
  save('locations',locs);renderLocations();renderLocationMarkers();closeModal();
}

  if(!filtered.length){el.innerHTML=`<div class="empty-state"><div class="emoji">📝</div><p>No notes yet.<br/>Write whatever's on your mind.</p></div>`;return;}

      <div class="note-text">${n.text}</div>

  }).join('');

function delNote(id){save('notes',load('notes').filter(n=>n.id!==id));renderNotes();}
function editNote(id){
  const notes=load('notes');const n=notes.find(x=>x.id===id);if(!n)return;
  openModal('Edit note',
    `<div class="modal-field"><label class="modal-label">Note</label><textarea class="modal-textarea" id="m-text">${n.text}</textarea></div>
    <div class="modal-field"><label class="modal-label">Category</label>
    <select class="modal-select" id="m-cat">${['personal','work','project','other'].map(c=>`<option value="${c}" ${c===n.cat?'selected':''}>${c}</option>`).join('')}</select></div>`,
    `<button class="modal-cancel" onclick="closeModal()">Cancel</button>
     <button class="modal-delete" onclick="delNote(${id});closeModal()">Delete</button>
     <button class="modal-save" onclick="saveNote(${id})">Save</button>`);
}
function saveNote(id){
  const notes=load('notes');const n=notes.find(x=>x.id===id);if(!n)return;
  n.text=document.getElementById('m-text').value.trim()||n.text;
  n.cat=document.getElementById('m-cat').value;
  save('notes',notes);renderNotes();closeModal();
}

// ── REFLECT ───────────────────────────────────────────

// CHECK-IN
const CHECKIN_QUESTIONS=[
  {q:'How did you move today?',opts:['🧘 Rest day','🚶 Walked','💪 Full workout','🏃 Run','🧗 Other']},
  {q:'Did you connect with someone?',opts:['Yes, meaningfully','Quick message','Not today']},
  {q:'One thing for future-you today?',opts:['📈 Invested / saved','📝 Applied / reached out','📚 Learned something','✨ Created','🛌 Rested intentionally','— Nothing today']}
];
let checkinStep=0, checkinAnswers=[];

function checkEveningCheckin(){
  const now=new Date();
  const h=now.getHours();
  const lastDone=localStorage.getItem('mm_checkin_done_date');
  if(h>=21&&lastDone!==TODAY_STR){
    setTimeout(()=>openCheckinSheet(),1500);
  }
}

function openCheckinSheet(){
  checkinStep=0; checkinAnswers=[];
  renderCheckinStep();
  document.getElementById('checkin-overlay').classList.add('visible');
}

function renderCheckinStep(){
  const q=CHECKIN_QUESTIONS[checkinStep];
  document.getElementById('checkin-q-num').textContent=`${checkinStep+1} / ${CHECKIN_QUESTIONS.length}`;
  document.getElementById('checkin-q-text').textContent=q.q;
  for(let i=0;i<3;i++) document.getElementById(`cpd${i}`).classList.toggle('active',i<=checkinStep);
  document.getElementById('checkin-options').innerHTML=q.opts.map((o,i)=>
    `<button class="checkin-opt ${checkinAnswers[checkinStep]===o?'selected':''}" onclick="selectCheckinOpt('${o.replace(/'/g,"\\'")}',this)">${o}</button>`
  ).join('');
  document.getElementById('checkin-back-btn').style.display=checkinStep>0?'block':'none';
  document.getElementById('checkin-next-btn').textContent=checkinStep===CHECKIN_QUESTIONS.length-1?'Done ✓':'Next →';
}

function selectCheckinOpt(opt,btn){
  checkinAnswers[checkinStep]=opt;
  document.querySelectorAll('.checkin-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function checkinNext(){
  if(!checkinAnswers[checkinStep]){alert('Please select an option.');return;}
  if(checkinStep<CHECKIN_QUESTIONS.length-1){
    checkinStep++;
    renderCheckinStep();
  } else {
    saveCheckin();
  }
}

function checkinBack(){
  if(checkinStep>0){checkinStep--;renderCheckinStep();}
}

function saveCheckin(){
  const checkins=load('checkins');
  checkins.unshift({date:TODAY_STR,answers:checkinAnswers,ts:Date.now()});
  save('checkins',checkins);
  localStorage.setItem('mm_checkin_done_date',TODAY_STR);
  document.getElementById('checkin-overlay').classList.remove('visible');
  renderReflect();
  // Invalidate today's home insight so it regenerates with new check-in data
  localStorage.removeItem('mm_insight_date');
}

function renderReflect(){
  renderCheckinStatus();
  renderWeeklyReviews();
  renderCheckinHistory();
}

function renderCheckinStatus(){
  const done=localStorage.getItem('mm_checkin_done_date')===TODAY_STR;
  const el=document.getElementById('checkin-status');
  if(done){
    const checkins=load('checkins');
    const today=checkins[0];
    el.innerHTML=`<div class="checkin-done-note">✓ Done today — ${today?.answers?.join(' · ')||''}</div>
    <button onclick="openCheckinSheet()" style="background:none;border:none;font-size:11px;color:var(--accent);cursor:pointer;display:block;margin:0 auto">Redo check-in</button>`;
  } else {
    el.innerHTML=`<button class="checkin-btn" onclick="openCheckinSheet()">✦ Daily check-in — 30 seconds</button>
    <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:6px">Appears automatically after 9pm</div>`;
  }
}

function renderCheckinHistory(){
  const checkins=load('checkins').slice(0,10);
  const el=document.getElementById('checkin-history');
  if(!checkins.length){el.innerHTML='<div class="empty-state" style="padding:20px 0"><p>No check-ins yet. They\'ll appear here after your first one.</p></div>';return;}
  el.innerHTML=checkins.map(c=>`
    <div class="checkin-log-item">
      <div class="checkin-log-date">${c.date}</div>
      <div class="checkin-log-answers">${c.answers?.join(' · ')||'—'}</div>
    </div>`).join('');
}

// WEEKLY REVIEW
function renderWeeklyReviews(){
  const reviews=load('reviews');
  const el=document.getElementById('weekly-review-section');
  const isSunday=new Date().getDay()===0;
  const thisWeek=getWeekKey();
  const hasThisWeek=reviews.find(r=>r.week===thisWeek);

  let html='';
  if(isSunday&&!hasThisWeek){
    html+=`<button class="review-gen-btn" onclick="generateWeeklyReview()">⚡ Generate this week's review</button>`;
  } else if(!isSunday&&!hasThisWeek){
    html+=`<div style="font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:10px">Weekly review generates on Sundays.</div>`;
  }
  if(!reviews.length){
    html+=`<div class="empty-state" style="padding:20px 0"><p>No weekly reviews yet.<br/>Your first one generates this Sunday.</p></div>`;
  } else {
    html+=reviews.slice(0,4).map(r=>`
      <div class="review-card">
        <div class="review-week">Week of ${r.week}</div>
        <div class="review-text">${r.text}</div>
      </div>`).join('');
  }
  el.innerHTML=html;
}

function getWeekKey(){
  const now=new Date();
  const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  return mon.toISOString().split('T')[0];
}

function generateWeeklyReview() {
  const context = buildWeekContext();
  const tasks = JSON.parse(localStorage.getItem('mm_tasks') || '[]');
  const deadlines = JSON.parse(localStorage.getItem('mm_admin_deadlines') || '[]');
  const budget = JSON.parse(localStorage.getItem('mm_budget') || '[]');
  const checkins = load('checkins').slice(0, 7);
  const workout = JSON.parse(localStorage.getItem('mm_workout') || '{}');

  const today = new Date();
  const weekKey = Object.keys(workout).sort().pop();
  const sessions = weekKey ? Object.values(workout[weekKey] || {}).filter(Boolean).length : 0;
  const doneTasks = tasks.filter(t => t.done).length;
  const todayTasks = tasks.filter(t => !t.done);
  const overdue = deadlines.filter(d => !d.done && new Date(d.date) < today);
  const urgent = deadlines.filter(d => !d.done && new Date(d.date) >= today && 
    Math.round((new Date(d.date) - today) / 86400000) <= 14);
  const overBudget = budget.filter(b => b.actual > b.target);
  const lastCheckin = checkins[0];

  // Paragraph 1 — what you did
  let p1 = `This week you completed ${doneTasks} task${doneTasks!==1?'s':''} and worked out ${sessions} time${sessions!==1?'s':''}.`;
  if (lastCheckin) p1 += ` Your last check-in: ${lastCheckin.answers?.join(' · ')}.`;
  if (overBudget.length === 0) p1 += ` Budget on track across all categories.`;

  // Paragraph 2 — what needs attention
  let p2Parts = [];
  if (overdue.length > 0) p2Parts.push(`${overdue.length} overdue item${overdue.length!==1?'s':''}: ${overdue.map(d=>d.text).join(', ')}`);
  if (overBudget.length > 0) p2Parts.push(`budget overrun on ${overBudget.map(b=>`${b.cat} (€${b.actual}/€${b.target})`).join(', ')}`);
  if (sessions < 2) p2Parts.push(`only ${sessions} workout${sessions!==1?'s':''} this week — aim for 3`);
  const p2 = p2Parts.length > 0
    ? `Needs attention: ${p2Parts.join('; ')}.`
    : `Nothing major to flag this week — well done.`;

  // Paragraph 3 — next week focus
  let p3 = '';
  if (urgent.length > 0) {
    const next = urgent.sort((a,b) => new Date(a.date)-new Date(b.date))[0];
    const days = Math.round((new Date(next.date) - today) / 86400000);
    p3 = `Next week: prioritise "${next.text}" — due in ${days} day${days!==1?'s':''}.`;
  } else if (todayTasks.length > 0) {
    p3 = `Next week: clear your ${todayTasks.length} pending task${todayTasks.length!==1?'s':''} and keep the momentum.`;
  } else {
    p3 = `Next week: keep up the consistency — you're on track.`;
  }

  const text = `${p1}\n\n${p2}\n\n${p3}`;

  const reviews = load('reviews');
  reviews.unshift({ week: getWeekKey(), text, date: TODAY_STR });
  save('reviews', reviews);
  localStorage.setItem('mm_weekly_seed', text);
  localStorage.setItem('mm_weekly_seed_date', getWeekKey());
  renderWeeklyReviews();
}

function buildWeekContext(){
  const tasks=JSON.parse(localStorage.getItem('mm_tasks')||'[]');
  const workout=JSON.parse(localStorage.getItem('mm_workout')||'{}');
  const checkins=load('checkins').slice(0,7);
  const deadlines=JSON.parse(localStorage.getItem('mm_admin_deadlines')||'[]');
  const budget=JSON.parse(localStorage.getItem('mm_budget')||'[]');
  const doneTasks=tasks.filter(t=>t.done).slice(0,10).map(t=>t.text);
  const overdueDl=deadlines.filter(d=>!d.done&&new Date(d.date)<new Date()).map(d=>d.text);
  const weekKey=Object.keys(workout).sort().pop();
  const sessions=weekKey?Object.entries(workout[weekKey]||{}).filter(([,v])=>v).map(([k])=>k):[];
  const budgetOverruns=budget.filter(b=>b.actual>b.target).map(b=>`${b.cat}: €${b.actual}/€${b.target}`);
  return `Tasks completed this week: ${doneTasks.join(', ')||'none'}
Overdue deadlines: ${overdueDl.join(', ')||'none'}
Workouts this week: ${sessions.join(', ')||'none logged'}
Check-ins this week: ${checkins.map(c=>c.answers?.join('/')).join(' | ')||'none'}
Budget overruns: ${budgetOverruns.join(', ')||'none'}`;
}

// ── INIT ──────────────────────────────────────────────
function renderAll(){
  renderLinks();
  renderLocations();
  renderIdeas();
  renderNotes();
  selectQACat('link');
}

openMain();
</script>
